<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Earth Anomaly Finder</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
text-align:center;
}

#map{
height:500px;
width:100%;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>🌍 Earth Anomaly Finder</h2>

<div id="map"></div>

<button onclick="scanArea()">Scan Area</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([0,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:19 }
).addTo(map);

function scanArea(){

let center = map.getCenter();

L.marker(center)
.addTo(map)
.bindPopup("⚠ Possible anomaly")
.openPopup();

}

</script>

</body>

</html>
