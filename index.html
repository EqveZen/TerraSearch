<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Earth Anomaly Scanner</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
text-align:center;
}

#map{
height:600px;
width:100%;
}

button{
margin-top:20px;
padding:12px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>🛰 Earth Anomaly Scanner</h2>

<div id="map"></div>

<button onclick="scanArea()">Scan Area</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([0,0],3);

// спутниковая карта

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:19
}
).addTo(map);



function scanArea(){

let center = map.getCenter();

for(let i=0;i<12;i++){

let lat = center.lat + (Math.random()-0.5)*4;
let lng = center.lng + (Math.random()-0.5)*4;

scanTile(lat,lng);

}

}



function scanTile(lat,lng){

let zoom = map.getZoom();

let tileX = long2tile(lng, zoom);
let tileY = lat2tile(lat, zoom);

let url =
`https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${tileY}/${tileX}`;

let img = new Image();

img.crossOrigin="anonymous";

img.src=url;

img.onload=function(){

let canvas=document.createElement("canvas");

canvas.width=256;
canvas.height=256;

let ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0);

let data=ctx.getImageData(0,0,256,256).data;

let edges=0;

for(let y=1;y<255;y++){

for(let x=1;x<255;x++){

let i=(y*256+x)*4;

let r=data[i];
let g=data[i+1];
let b=data[i+2];

let brightness=(r+g+b)/3;

let i2=((y+1)*256+x)*4;

let r2=data[i2];
let g2=data[i2+1];
let b2=data[i2+2];

let brightness2=(r2+g2+b2)/3;

let diff=Math.abs(brightness-brightness2);

if(diff>40){

edges++;

}

}

}

if(edges>8000){

L.marker([lat,lng])
.addTo(map)
.bindPopup("⚠ geometric anomaly");

}

};

}

if(contrast>7000){

L.marker([lat,lng])
.addTo(map)
.bindPopup("⚠ Satellite anomaly");

}

};

}



function long2tile(lon,zoom){
return Math.floor((lon+180)/360*Math.pow(2,zoom));
}

function lat2tile(lat,zoom){
return Math.floor(
(1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2
*Math.pow(2,zoom)
);
}

</script>

</body>

</html>
